# Cloudflare Worker — Massenstromrechner Analytics
#
# WICHTIG vor dem Deploy:
#   1. 'name' muss exakt dem Worker-Namen im Cloudflare Dashboard entsprechen
#   2. 'id' muss die echte KV Namespace ID sein (32-stelliger Hex-String)
#
# KV Namespace ID findest du unter:
#   Cloudflare Dashboard → Workers & Pages → KV → massenstrom-visits → Details

name               = "massenstromrechner"
main               = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "VISITS"
id      = "68076f61d015e3817540745dafadff4a"
# Beispiel wie die ID aussieht:
# id = "a1b2c3d4e5f6789012345678901234ab"
